<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Chat App</title>
    <meta name="title" content="Chat App" />
    <meta
      name="description"
      content="A very simple chat app built using Socket.IO"
    />

    <link rel="icon" href="./logo.png" type="image/png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Chat App" />
    <meta
      property="og:description"
      content="A very simple chat app built using Socket.IO"
    />
    <meta
      property="og:image"
      content="https://global-chat-j7ib.onrender.com/logo.png"
    />
    <meta property="og:url" content="https://chat.sagarkemble.dev" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chat App" />
    <meta
      name="twitter:description"
      content="A very simple chat app built using Socket.IO"
    />
    <meta
      name="twitter:image"
      content="https://global-chat-j7ib.onrender.com/logo.png"
    />

    <!-- Theme -->
    <meta name="theme-color" content="#09090b" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #09090b;
        --surface: #18181b;
        --surface-2: #27272a;
        --border: #3f3f46;
        --border-subtle: #27272a;
        --text: #fafafa;
        --text-muted: #a1a1aa;
        --text-dim: #71717a;
        --accent: #f4f4f5;
        --accent-fg: #09090b;
        --radius: 8px;
        --radius-lg: 12px;
        --font: "Geist", sans-serif;
        --font-mono: "Geist Mono", monospace;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 14px;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* ── Login Screen ── */
      #login-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        width: 100%;
        max-width: 360px;
        padding: 24px;
        animation: fadeUp 0.35s ease both;
      }

      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .brand-icon {
        width: 40px;
        height: 40px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }

      .brand h1 {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.4px;
      }

      .brand p {
        font-size: 13px;
        color: var(--text-muted);
      }

      .login-card {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
      }

      input[type="text"] {
        background: var(--bg);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--font);
        font-size: 14px;
        padding: 9px 12px;
        outline: none;
        transition: border-color 0.15s;
        width: 100%;
      }

      input[type="text"]:focus {
        border-color: var(--border);
        box-shadow: 0 0 0 2px rgba(244, 244, 245, 0.06);
      }

      input[type="text"]::placeholder {
        color: var(--text-dim);
      }

      .btn {
        background: var(--accent);
        color: var(--accent-fg);
        border: none;
        border-radius: var(--radius);
        padding: 9px 16px;
        font-family: var(--font);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition:
          opacity 0.15s,
          transform 0.1s;
        width: 100%;
      }

      .btn:hover {
        opacity: 0.88;
      }
      .btn:active {
        transform: scale(0.98);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* ── Chat Screen ── */
      #chat-screen {
        display: none;
        flex-direction: column;
        height: 100dvh;
        width: 100%;
        max-width: 620px;
        padding: 0;
        animation: fadeUp 0.3s ease both;
      }

      .chat-header {
        border-bottom: 1px solid var(--border-subtle);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--bg);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .online-dot {
        width: 7px;
        height: 7px;
        background: #22c55e;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .chat-header-title {
        font-weight: 500;
        font-size: 14px;
        flex: 1;
      }

      .self-badge {
        font-size: 11px;
        color: var(--text-dim);
        font-family: var(--font-mono);
        background: var(--surface);
        border: 1px solid var(--border-subtle);
        border-radius: 4px;
        padding: 2px 7px;
      }

      /* ── Online badge ── */
      .online-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        background: var(--surface);
        border: 1px solid var(--border-subtle);
        border-radius: 20px;
        padding: 4px 10px;
        cursor: pointer;
        font-family: var(--font);
        font-size: 12px;
        color: var(--text-muted);
        transition:
          background 0.15s,
          border-color 0.15s;
        position: relative;
      }

      .online-btn:hover {
        background: var(--surface-2);
        border-color: var(--border);
      }

      .online-btn .dot {
        width: 6px;
        height: 6px;
        background: #22c55e;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .online-count {
        font-family: var(--font-mono);
        font-weight: 500;
        color: var(--text);
      }

      /* ── Users popover ── */
      .popover-backdrop {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: none;
      }

      .popover-backdrop.open {
        display: block;
      }

      .users-popover {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        z-index: 50;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        width: 220px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        animation: popIn 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        display: none;
      }

      .users-popover.open {
        display: block;
      }

      .popover-header {
        padding: 10px 14px 8px;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        border-bottom: 1px solid var(--border-subtle);
      }

      .users-list {
        max-height: 240px;
        overflow-y: auto;
        padding: 6px;
        scrollbar-width: thin;
        scrollbar-color: var(--border-subtle) transparent;
      }

      .user-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 6px;
        transition: background 0.1s;
      }

      .user-row:hover {
        background: var(--surface-2);
      }

      .user-row .avatar {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        font-size: 11px;
        flex-shrink: 0;
      }

      .user-info {
        flex: 1;
        overflow: hidden;
      }

      .user-display-name {
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .user-tag-row {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .user-tag {
        font-size: 10px;
        color: var(--text-dim);
        font-family: var(--font-mono);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .user-status-dot {
        width: 6px;
        height: 6px;
        background: #22c55e;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .you-tag {
        font-size: 10px;
        color: var(--text-dim);
        background: var(--bg);
        border: 1px solid var(--border-subtle);
        border-radius: 4px;
        padding: 1px 5px;
        flex-shrink: 0;
      }

      @keyframes popIn {
        from {
          opacity: 0;
          transform: translateY(-6px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* ── Messages ── */
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        scrollbar-width: thin;
        scrollbar-color: var(--border-subtle) transparent;
      }

      .msg-group {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-bottom: 10px;
      }

      .msg-group.self {
        align-items: flex-end;
      }
      .msg-group.other {
        align-items: flex-start;
      }

      .msg-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 4px;
        padding: 0 4px;
      }

      .msg-group.self .msg-meta {
        flex-direction: row-reverse;
      }

      .avatar {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 600;
        flex-shrink: 0;
        color: #fff;
        font-family: var(--font-mono);
      }

      .sender-name {
        font-size: 12px;
        color: var(--text-dim);
        font-weight: 500;
      }

      .msg-group.self .sender-name {
        color: var(--text-dim);
      }

      .bubble {
        max-width: 70%;
        padding: 8px 12px;
        border-radius: 10px;
        font-size: 14px;
        line-height: 1.5;
        word-break: break-word;
        position: relative;
      }

      .msg-group.other .bubble {
        background: var(--surface);
        border: 1px solid var(--border-subtle);
        border-radius: 2px 10px 10px 10px;
        color: var(--text);
      }

      .msg-group.self .bubble {
        background: var(--accent);
        color: var(--accent-fg);
        border-radius: 10px 2px 10px 10px;
      }

      .bubble-in {
        animation: bubbleIn 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
      }

      /* ── Typing indicator ── */
      #typing-area {
        min-height: 28px;
        padding: 0 20px 8px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .typing-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--surface);
        border: 1px solid var(--border-subtle);
        border-radius: 20px;
        padding: 4px 10px;
        font-size: 12px;
        color: var(--text-muted);
        animation: fadeIn 0.2s ease both;
      }

      .typing-dots {
        display: flex;
        gap: 2px;
        align-items: center;
      }

      .typing-dots span {
        width: 4px;
        height: 4px;
        background: var(--text-dim);
        border-radius: 50%;
        animation: bounce 1.2s ease infinite;
      }

      .typing-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      /* ── Input bar ── */
      .input-bar {
        border-top: 1px solid var(--border-subtle);
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--bg);
      }

      #messageInput {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--font);
        font-size: 14px;
        padding: 9px 12px;
        outline: none;
        resize: none;
        transition: border-color 0.15s;
        line-height: 1.5;
        max-height: 120px;
        overflow-y: auto;
        scrollbar-width: none;
      }
      #messageInput::-webkit-scrollbar {
        display: none;
      }

      #messageInput:focus {
        border-color: var(--border);
      }
      #messageInput::placeholder {
        color: var(--text-dim);
      }

      .send-btn {
        background: var(--accent);
        color: var(--accent-fg);
        border: none;
        border-radius: var(--radius);
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition:
          opacity 0.15s,
          transform 0.1s;
      }

      .send-btn:hover {
        opacity: 0.85;
      }
      .send-btn:active {
        transform: scale(0.94);
      }

      .send-btn svg {
        width: 16px;
        height: 16px;
      }

      /* ── Empty state ── */
      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--text-dim);
        font-size: 13px;
        padding: 40px;
        text-align: center;
      }

      .empty-icon {
        font-size: 32px;
        opacity: 0.4;
        margin-bottom: 4px;
      }

      /* ── Date separator ── */
      .date-sep {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 12px 0;
      }

      .date-sep::before,
      .date-sep::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border-subtle);
      }

      .date-sep span {
        font-size: 11px;
        color: var(--text-dim);
        font-family: var(--font-mono);
        white-space: nowrap;
      }

      /* ── GIF picker ── */
      .gif-btn {
        background: var(--surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius);
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition:
          background 0.15s,
          border-color 0.15s;
        color: var(--text-muted);
        font-size: 11px;
        font-family: var(--font-mono);
        font-weight: 600;
        letter-spacing: -0.5px;
      }
      .gif-btn:hover {
        background: var(--surface-2);
        border-color: var(--border);
        color: var(--text);
      }
      .gif-btn.active {
        border-color: var(--border);
        color: var(--text);
        background: var(--surface-2);
      }

      .gif-panel {
        position: absolute;
        bottom: calc(100% + 8px);
        left: 0;
        right: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.5);
        animation: popIn 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        display: none;
        flex-direction: column;
        max-height: 460px;
        z-index: 20;
      }
      .gif-panel.open {
        display: flex;
      }

      .gif-search-wrap {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .gif-search-wrap svg {
        width: 14px;
        height: 14px;
        color: var(--text-dim);
        flex-shrink: 0;
      }

      #gifSearch {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-family: var(--font);
        font-size: 13px;
      }
      #gifSearch::placeholder {
        color: var(--text-dim);
      }

      .gif-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 4px;
        overflow-y: auto;
        padding: 6px;
        scrollbar-width: thin;
        scrollbar-color: var(--border-subtle) transparent;
        flex: 1;
      }

      .gif-item {
        height: 140px;
        border-radius: 6px;
        overflow: hidden;
        cursor: pointer;
        background: var(--surface-2);
        transition:
          opacity 0.12s,
          transform 0.12s;
        position: relative;
      }
      .gif-item:hover {
        opacity: 0.85;
        transform: scale(0.97);
      }
      .gif-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .gif-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        color: var(--text-dim);
        font-size: 12px;
        gap: 8px;
      }

      .gif-spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--border);
        border-top-color: var(--text-muted);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .bubble-gif {
        max-width: 240px;
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
      }
      .bubble-gif img {
        width: 100%;
        display: block;
        border-radius: 10px;
      }

      /* ── Animations ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes bubbleIn {
        from {
          opacity: 0;
          transform: scale(0.96) translateY(4px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      @keyframes bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-4px);
        }
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!-- ── Login ── -->
    <div id="login-screen">
      <div class="brand">
        <div class="brand-icon">💬</div>
        <h1>Chat</h1>
        <p>Enter your name to start chatting</p>
      </div>
      <div class="login-card">
        <div class="field">
          <label for="usernameInput">Display name</label>
          <input
            type="text"
            id="usernameInput"
            placeholder="e.g. sagar"
            maxlength="20"
            autocomplete="off"
          />
        </div>
        <button class="btn" id="joinBtn" disabled>Join room</button>
      </div>
    </div>

    <!-- ── Chat ── -->
    <div id="chat-screen">
      <div class="chat-header">
        <div class="online-dot"></div>
        <span class="chat-header-title">Global chat</span>
        <span class="self-badge" id="selfBadge">—</span>
        <div style="position: relative">
          <button class="online-btn" id="onlineBtn">
            <span class="dot"></span>
            <span class="online-count" id="onlineCount">0</span>
            <span>online</span>
          </button>
          <div class="users-popover" id="usersPopover">
            <div class="popover-header">Online now</div>
            <div class="users-list" id="usersList"></div>
          </div>
        </div>
      </div>
      <div class="popover-backdrop" id="popoverBackdrop"></div>

      <div id="messages">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">👋</div>
          <span>No messages yet.<br />Say something!</span>
        </div>
      </div>

      <div id="typing-area"></div>

      <div class="input-bar" style="position: relative">
        <div class="gif-panel" id="gifPanel">
          <div class="gif-search-wrap">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              type="text"
              id="gifSearch"
              placeholder="Search GIFs…"
              autocomplete="off"
            />
          </div>
          <div class="gif-grid" id="gifGrid">
            <div class="gif-loading">
              <div class="gif-spinner"></div>
              Loading…
            </div>
          </div>
        </div>
        <button class="gif-btn" id="gifBtn" title="Send a GIF">GIF</button>
        <textarea id="messageInput" rows="1" placeholder="Message…"></textarea>
        <button class="send-btn" id="sendButton" title="Send">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      // ── Palette for avatars ──
      const COLORS = [
        "#e11d48",
        "#7c3aed",
        "#2563eb",
        "#0891b2",
        "#059669",
        "#d97706",
        "#dc2626",
        "#9333ea",
      ];
      const colorMap = {};
      let colorIdx = 0;

      function colorFor(name) {
        if (!colorMap[name]) {
          colorMap[name] = COLORS[colorIdx % COLORS.length];
          colorIdx++;
        }
        return colorMap[name];
      }

      function initials(name) {
        return name.slice(0, 2).toUpperCase();
      }

      // ── DOM refs ──
      const loginScreen = document.getElementById("login-screen");
      const chatScreen = document.getElementById("chat-screen");
      const usernameInput = document.getElementById("usernameInput");
      const joinBtn = document.getElementById("joinBtn");
      const selfBadge = document.getElementById("selfBadge");
      const messagesEl = document.getElementById("messages");
      const typingArea = document.getElementById("typing-area");
      const messageInput = document.getElementById("messageInput");
      const sendButton = document.getElementById("sendButton");
      const onlineBtn = document.getElementById("onlineBtn");
      const onlineCount = document.getElementById("onlineCount");
      const usersPopover = document.getElementById("usersPopover");
      const usersList = document.getElementById("usersList");
      const popoverBackdrop = document.getElementById("popoverBackdrop");
      const gifBtn = document.getElementById("gifBtn");
      const gifPanel = document.getElementById("gifPanel");
      const gifGrid = document.getElementById("gifGrid");
      const gifSearch = document.getElementById("gifSearch");

      const GIPHY_KEY = "zshit28vOjtQd312n72sXlEQij3M7jRT";

      // ── State ──
      let socket = null;
      let myName = "";
      let myServerName = ""; // full name assigned by server e.g. "sagar-4521"
      let typingTimers = {};
      let typingUsers = new Set();
      let onlineUsers = [];

      // ── Login gate ──
      usernameInput.addEventListener("input", () => {
        joinBtn.disabled = usernameInput.value.trim().length < 2;
      });

      usernameInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !joinBtn.disabled) joinChat();
      });

      joinBtn.addEventListener("click", joinChat);

      function joinChat() {
        myName = usernameInput.value.trim();
        if (!myName) return;

        selfBadge.textContent = myName;
        loginScreen.style.display = "none";
        chatScreen.style.display = "flex";

        socket = io({ auth: { username: myName } });

        socket.on("users", (users) => {
          onlineUsers = users;
          onlineCount.textContent = users.length;
          renderUsersList();
        });

        socket.on("server:client-typing", ({ userName }) => {
          handleTyping(userName);
        });

        socket.on("server:client-message", ({ userName, message }) => {
          // First message from server reveals our own server-assigned name
          if (!myServerName && userName) {
            // We learn our server name when the first users list arrives
          }
          addMessage(userName, message, false);
          clearTyping(userName);
        });

        messageInput.focus();
      }

      // ── Online users popover ──
      onlineBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const isOpen = usersPopover.classList.contains("open");
        if (isOpen) {
          closePopover();
        } else {
          usersPopover.classList.add("open");
          popoverBackdrop.classList.add("open");
        }
      });

      popoverBackdrop.addEventListener("click", closePopover);

      function closePopover() {
        usersPopover.classList.remove("open");
        popoverBackdrop.classList.remove("open");
      }

      function renderUsersList() {
        usersList.innerHTML = "";
        if (onlineUsers.length === 0) {
          usersList.innerHTML =
            '<div style="padding:12px 14px;font-size:12px;color:var(--text-dim);">No users online</div>';
          return;
        }

        onlineUsers.forEach((serverName) => {
          // serverName format: "displayname-XXXX"
          const parts = serverName.split("-");
          const tag = parts.pop(); // "4521"
          const displayName = parts.join("-"); // handles names with hyphens

          // Detect if this is "us" — our server name starts with our chosen name
          const isMe = serverName.startsWith(myName + "-");

          const row = document.createElement("div");
          row.className = "user-row";

          const color = isMe ? "#52525b" : colorFor(serverName);

          row.innerHTML = `
            <div class="avatar" style="background:${color};">${initials(displayName)}</div>
            <div class="user-info">
              <div class="user-display-name">${displayName}</div>
              <div class="user-tag-row">
                <span class="user-tag">#${tag}</span>
                ${isMe ? '<span class="you-tag">you</span>' : ""}
              </div>
            </div>
            <div class="user-status-dot"></div>
          `;

          usersList.appendChild(row);
        });
      }

      // ── Typing ──
      function handleTyping(userName) {
        typingUsers.add(userName);
        renderTyping();
        clearTimeout(typingTimers[userName]);
        typingTimers[userName] = setTimeout(() => clearTyping(userName), 2500);
      }

      function clearTyping(userName) {
        typingUsers.delete(userName);
        delete typingTimers[userName];
        renderTyping();
      }

      function renderTyping() {
        typingArea.innerHTML = "";
        if (typingUsers.size === 0) return;

        [...typingUsers].forEach((name) => {
          const pill = document.createElement("div");
          pill.className = "typing-pill";
          pill.innerHTML = `
            <div class="avatar" style="background:${colorFor(name)};width:18px;height:18px;border-radius:4px;font-size:9px;">
              ${initials(name)}
            </div>
            <span>${name}</span>
            <div class="typing-dots"><span></span><span></span><span></span></div>`;
          typingArea.appendChild(pill);
        });
      }

      function addMessage(userName, payload, isSelf) {
        const empty = document.getElementById("emptyState");
        if (empty) empty.remove();

        const isGif =
          payload && typeof payload === "object" && payload.type === "gif";
        const text = isGif ? null : typeof payload === "string" ? payload : "";

        let group;
        const existingGroups = messagesEl.querySelectorAll(".msg-group");
        const lastGroup = existingGroups[existingGroups.length - 1];

        if (lastGroup && lastGroup.dataset.sender === userName) {
          group = lastGroup;
        } else {
          group = document.createElement("div");
          group.className = `msg-group ${isSelf ? "self" : "other"}`;
          group.dataset.sender = userName;

          const meta = document.createElement("div");
          meta.className = "msg-meta";

          const avatar = document.createElement("div");
          avatar.className = "avatar";
          avatar.style.background = isSelf ? "#52525b" : colorFor(userName);
          avatar.textContent = initials(userName);

          const senderName = document.createElement("span");
          senderName.className = "sender-name";
          senderName.textContent = isSelf ? "You" : userName;

          meta.appendChild(avatar);
          meta.appendChild(senderName);
          group.appendChild(meta);
          messagesEl.appendChild(group);
        }

        if (isGif) {
          const wrap = document.createElement("div");
          wrap.className = "bubble-gif bubble-in";
          wrap.innerHTML = `<img src="${payload.url}" alt="GIF" />`;
          group.appendChild(wrap);
        } else {
          const bubble = document.createElement("div");
          bubble.className = "bubble bubble-in";
          bubble.textContent = text;
          group.appendChild(bubble);
        }

        scrollToBottom();
      }

      function scrollToBottom() {
        // Double rAF ensures DOM has fully painted before measuring scrollHeight
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            messagesEl.scrollTo({
              top: messagesEl.scrollHeight,
              behavior: "smooth",
            });
          });
        });
      }

      // ── Send ──
      function sendMessage() {
        const text = messageInput.value.trim();
        if (!text || !socket) return;

        socket.emit("client:message", text);
        addMessage(myName, text, true);
        messageInput.value = "";
        messageInput.style.height = "auto";
      }
      sendButton.addEventListener("click", sendMessage);

      messageInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      let typingEmitted = false;
      let typingTimeout;

      messageInput.addEventListener("input", () => {
        if (!socket) return;
        messageInput.style.height = "auto";
        messageInput.style.height =
          Math.min(messageInput.scrollHeight, 120) + "px";

        if (!typingEmitted) {
          socket.emit("client:typing", true);
          typingEmitted = true;
        }
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          typingEmitted = false;
        }, 1000);
      });
      // ── GIF picker ──
      let gifDebounce;
      let gifPanelOpen = false;

      gifBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        gifPanelOpen = !gifPanelOpen;
        gifPanel.classList.toggle("open", gifPanelOpen);
        gifBtn.classList.toggle("active", gifPanelOpen);
        if (gifPanelOpen) {
          fetchGifs("trending");
          gifSearch.focus();
        }
      });

      // Close panel when clicking outside
      document.addEventListener("click", (e) => {
        if (
          gifPanelOpen &&
          !gifPanel.contains(e.target) &&
          e.target !== gifBtn
        ) {
          closeGifPanel();
        }
      });

      gifSearch.addEventListener("input", () => {
        clearTimeout(gifDebounce);
        const q = gifSearch.value.trim();
        gifDebounce = setTimeout(() => fetchGifs(q || "trending"), 400);
      });

      gifSearch.addEventListener("keydown", (e) => e.stopPropagation()); // prevent send on enter

      function closeGifPanel() {
        gifPanelOpen = false;
        gifPanel.classList.remove("open");
        gifBtn.classList.remove("active");
      }

      async function fetchGifs(query) {
        gifGrid.innerHTML =
          '<div class="gif-loading"><div class="gif-spinner"></div> Loading…</div>';
        try {
          const endpoint =
            query === "trending"
              ? `https://api.giphy.com/v1/gifs/trending?api_key=${GIPHY_KEY}&limit=18&rating=g`
              : `https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_KEY}&q=${encodeURIComponent(query)}&limit=18&rating=g`;
          const res = await fetch(endpoint);
          const json = await res.json();
          renderGifs(json.data);
        } catch {
          gifGrid.innerHTML =
            '<div class="gif-loading">Failed to load GIFs</div>';
        }
      }

      function renderGifs(gifs) {
        if (!gifs.length) {
          gifGrid.innerHTML = '<div class="gif-loading">No GIFs found</div>';
          return;
        }
        gifGrid.innerHTML = "";
        gifs.forEach((gif) => {
          const url = gif.images.fixed_height_small.url;
          const fullUrl = gif.images.downsized_medium.url;
          const item = document.createElement("div");
          item.className = "gif-item";
          item.innerHTML = `<img src="${url}" alt="gif" loading="lazy" />`;
          item.addEventListener("click", () => sendGif(fullUrl));
          gifGrid.appendChild(item);
        });
      }

      function sendGif(url) {
        if (!socket) return;
        socket.emit("client:message", { type: "gif", url });
        addMessage(myName, { type: "gif", url }, true);
        closeGifPanel();
        scrollToBottom();
      }
    </script>
  </body>
</html>
